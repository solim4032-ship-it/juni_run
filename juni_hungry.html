<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>준이는 배고파</title>

<link href="https://fonts.googleapis.com/css2?family=Cute+Font&display=swap" rel="stylesheet">
  
<style>
body{
margin:0;
overflow:hidden;
font-family: 'Cute Font', cursive;
}
  
body{
margin:0;
overflow:hidden;
}

#game{
width:100vw;
height:100vh;
background:url("background2.png") center/cover;
position:relative;
overflow:hidden;
}

#juni{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:120px;
}

.food{
position:absolute;
width:60px;
}
  
#score{
position:absolute;
top:20px;
left:20px;
font-size:32px;
color:white;
text-shadow:3px 3px 8px black;
letter-spacing:1px;
}

#gameOver{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:35px;
color:white;
text-align:center;
text-shadow:2px 2px 10px black;
display:none;
}

#backBtn{
position:absolute;
top:20px;
right:20px;
font-size:18px;
padding:10px 20px;
}

</style>
</head>

<body>

<div id="game">

<button id="backBtn" onclick="goBack()">뒤로</button>

<div id="score">Coin : 0 | Time : 0</div>

<div id="gameOver"></div>

<img id="juni" src="juni.png">

</div>

<script>

const game = document.getElementById("game")
const juni = document.getElementById("juni")
const score = document.getElementById("score")
const gameOverText = document.getElementById("gameOver")

let foods=[]
let coin=0
let time=0
let gameOver=false

let spawnInterval
let timerInterval

let fallSpeed=1.5
let goldenTimer=0

let moveSpeed = 3
let moveLeft = false
let moveRight = false

/* ===== 음식 리스트 ===== */

const goodFoods=[
"food1.png",
"food2.png",
"food3.png",
"food4.png",
"food5.png",
"food6.png"
]

const rottenFoods=[
"rotten1.png",
"rotten2.png",
"rotten3.png",
"rotten4.png"
]

/* ===== 음식 생성 ===== */

function createFood(){

if(gameOver) return

let food=document.createElement("img")

let type
let img

/* 골든 음식 */
if(goldenTimer>=30){

type="gold"
img="gold.png"
goldenTimer=0

}

/* 일반 음식 */
else{

let rand=Math.random()

if(rand<0.7){

type="good"
img=goodFoods[Math.floor(Math.random()*goodFoods.length)]

}else{

type="rotten"
img=rottenFoods[Math.floor(Math.random()*rottenFoods.length)]

}

}

food.src=img
food.className="food"
food.dataset.type=type

food.style.left=Math.random()*(window.innerWidth-60)+"px"
food.style.top="-60px"

game.appendChild(food)
foods.push(food)

}

/* ===== 음식 이동 ===== */

function updateFoods(){

for(let i = foods.length-1; i >= 0; i--){

let food = foods[i]

let top = parseFloat(food.style.top)

food.style.top = (top + fallSpeed) + "px"

if(checkCollision(juni, food)){

if(food.dataset.type==="good"){
coin += 1
}
else if(food.dataset.type==="gold"){
coin += 5
}
else{
endGame()
}

food.remove()
foods.splice(i,1)
continue
}

if(top > window.innerHeight){

food.remove()
foods.splice(i,1)

}

}

}

function moveJuni(){

let left = juni.offsetLeft
let juniWidth = juni.offsetWidth
let gameWidth = window.innerWidth

if(moveLeft){
left -= moveSpeed
}

if(moveRight){
left += moveSpeed
}

left = Math.max(0, left)
left = Math.min(gameWidth - juniWidth, left)

juni.style.left = left + "px"

}

/* ===== 충돌 ===== */

function checkCollision(a,b){

let r1=a.getBoundingClientRect()
let r2=b.getBoundingClientRect()

return !(

r1.right<r2.left ||
r1.left>r2.right ||
r1.bottom<r2.top ||
r1.top>r2.bottom

)

}

/* ===== 게임 루프 ===== */

function gameLoop(){

if(!gameOver){

updateFoods()
moveJuni()

score.innerHTML=
"Coin : "+coin+" | Time : "+time

}

requestAnimationFrame(gameLoop)

}

/* ===== 음식 생성 ===== */

function startGame(){

spawnInterval=setInterval(createFood,1200)

timerInterval=setInterval(()=>{

time++
goldenTimer++

/* 속도 증가 */

if(time%10===0){

fallSpeed+=0.2

}

},1000)

gameLoop()

}

startGame()

/* ===== 이동 ===== */

document.addEventListener("keydown", e=>{

if(gameOver){

if(e.code==="Space") restartGame()
return
}

if(e.code==="ArrowLeft"){
moveLeft = true
}

if(e.code==="ArrowRight"){
moveRight = true
}

})

document.addEventListener("keyup", e=>{

if(e.code==="ArrowLeft"){
moveLeft = false
}

if(e.code==="ArrowRight"){
moveRight = false
}

})

/* ===== 게임오버 ===== */

function endGame(){

gameOver=true

clearInterval(spawnInterval)
clearInterval(timerInterval)

saveCoin()

gameOverText.style.display="block"
gameOverText.innerHTML=
"게임 오버<br><br>스페이스바로 재시작"

}

/* ===== 코인 저장 ===== */

function saveCoin(){

let currentUser=localStorage.getItem("currentUser")

if(currentUser){

let users=JSON.parse(localStorage.getItem("users")||"{}")

if(users[currentUser]){

users[currentUser].coin+=coin

localStorage.setItem("users",JSON.stringify(users))

}

}

}

/* ===== 재시작 ===== */

function restartGame(){

foods.forEach(f=>f.remove())
foods=[]

coin=0
time=0
fallSpeed=3
goldenTimer=0

gameOver=false

gameOverText.style.display="none"

clearInterval(spawnInterval)
clearInterval(timerInterval)

startGame()

}

/* ===== 뒤로가기 ===== */

function goBack(){

window.location.href="index.html"

}

</script>

</body>
</html>
