<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User Page</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:'Jua', sans-serif;
}

#userPage{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:space-between;
    align-items:center; 
    position:relative;
}

/* 왼쪽 */
#leftSection{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}
.juniBox{
    background:white;
    width:400px;
    height:400px;
    border-radius:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
#bigJuni{
    width:350px;
    cursor:pointer;
}

#characterWrap{
    position:relative;
    width:350px;
    height:350px;
}

#characterWrap img{
    position:absolute;
    width:100%;
    height:100%;
    left:0;
    top:0;
}

/* 오른쪽 */
#rightSection{
    width:50%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:30px;
}

/* 상단 버튼 */
#topButtons{
    position:absolute;
    top:20px;
    right:20px;
}
#topButtons button{
    margin-left:10px;
    padding:10px 20px;
    font-size:18px;
}

/* 색상 선택 */
#colorPicker{
    position:absolute;
    bottom:20px;
    right:20px;
    display:grid;
    grid-template-columns: repeat(5, 30px);
    gap:10px;
}
.color{
    width:30px;
    height:30px;
    border-radius:50%;
    cursor:pointer;
    border:1px solid #999;
}
.red{background:#ffadad;}
.orange{background:#ffd6a5;}
.yellow{background:#fdffb6;}
.green{background:#caffbf;}
.lime{background:#b5ead7;}
.blue{background:#a0c4ff;}
.sky{background:#bde0fe;}
.purple{background:#cdb4db;}
.pink{background:#ffc8dd;}
.white{background:#ffffff;}
.color:hover{
    transform:scale(1.2);
    transition:0.2s;
}
</style>
</head>

<body>

<div id="userPage">

    <div id="topButtons">
        <button onclick="goShop()">상점</button>
        <button onclick="goBack()">뒤로</button>
    </div>

    <div id="leftSection">
        <div class="juniBox">
           <div id="characterWrap">
             <img src="juni.png" id="bigJuni">
             <img id="hatLayer">
             <img id="glassLayer">
             <img id="clothLayer">
        </div>
    </div>
</div>

    <div id="rightSection">
        <h2 id="userName"></h2>
        <h3 id="userCoin"></h3>
    </div>

    <div id="colorPicker">
        <div class="color red" onclick="changeColor('#ffadad')"></div>
        <div class="color orange" onclick="changeColor('#ffd6a5')"></div>
        <div class="color yellow" onclick="changeColor('#fdffb6')"></div>
        <div class="color green" onclick="changeColor('#caffbf')"></div>
        <div class="color lime" onclick="changeColor('#b5ead7')"></div>
        <div class="color blue" onclick="changeColor('#a0c4ff')"></div>
        <div class="color sky" onclick="changeColor('#bde0fe')"></div>
        <div class="color purple" onclick="changeColor('#cdb4db')"></div>
        <div class="color pink" onclick="changeColor('#ffc8dd')"></div>
        <div class="color white" onclick="changeColor('#ffffff')"></div>
    </div>

</div>

<script>
// 현재 로그인 사용자
let currentUser = localStorage.getItem("currentUser");
if(!currentUser){
    alert("로그인 후 이용하세요.");
    window.location.href="index.html";
}

// 유저 정보 가져오기
let users = JSON.parse(localStorage.getItem("users")||"{}");
let userData = users[currentUser];

// 유저페이지 업데이트 함수
function updateUserPage(){
    if(!userData) return;

    // 이름과 코인 표시
    document.getElementById("userName").innerText = "이름 : " + currentUser;
    document.getElementById("userCoin").innerText = "코인 : " + userData.coin;

    // 배경색 복원
    if(userData.bgColor){
        document.getElementById("userPage").style.backgroundColor = userData.bgColor;
    }

    // 장착 아이템 표시
if(userData.equipped){

    document.getElementById("hatLayer").src =
        userData.equipped.hat ? userData.equipped.hat : "";

    document.getElementById("glassLayer").src =
        userData.equipped.glass ? userData.equipped.glass : "";

    document.getElementById("clothLayer").src =
        userData.equipped.cloth ? userData.equipped.cloth : "";
}

    // 관리자 버튼
    if(userData.role === "admin" && !document.getElementById("adminBtn")){
        let adminBtn = document.createElement("button");
        adminBtn.id = "adminBtn";
        adminBtn.innerText = "관리자 페이지";
        adminBtn.style.position="fixed";
        adminBtn.style.bottom="20px";
        adminBtn.style.left="20px";
        adminBtn.style.padding="12px 20px";
        adminBtn.style.background="#ffd6e0";
        adminBtn.style.border="none";
        adminBtn.style.borderRadius="15px";
        adminBtn.style.cursor="pointer";
        adminBtn.style.fontSize="18px";
        adminBtn.onclick = function(){
            window.location.href="admin.html";
        };
        document.body.appendChild(adminBtn);
    }
}

// 페이지 로드 시 실행
updateUserPage();

// 뒤로
function goBack(){
    window.location.href="index.html"; // index.html로 이동
}

// 상점
function goShop(){
    window.location.href="shop.html";
}

// 배경색 변경
function changeColor(color){
    document.getElementById("userPage").style.backgroundColor=color;
    userData.bgColor=color;
    localStorage.setItem("users",JSON.stringify(users));
}

// 초기 배경색 적용
if(userData.bgColor){
    document.getElementById("userPage").style.backgroundColor=userData.bgColor;
}
</script>

</body>
</html>
