<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User Page</title>

<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Jua', sans-serif;
}

#userPage{
    width:100vw;
    height:100vh;
    display:flex;
    position:relative;
}

/* 왼쪽 */
#leftSection{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

#bigJuni{
    width:350px;
    cursor:pointer;
}

/* 오른쪽 */
#rightSection{
    width:50%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:30px;
}

/* 상단 버튼 */
#topButtons{
    position:absolute;
    top:20px;
    right:20px;
}

#topButtons button{
    margin-left:10px;
    padding:10px 20px;
    font-size:18px;
}

/* 색상 선택 */
#colorPicker{
    position:absolute;
    bottom:20px;
    right:20px;
    display:grid;
    grid-template-columns: repeat(5, 30px);
    gap:10px;
}

.color{
    width:30px;
    height:30px;
    border-radius:50%;
    cursor:pointer;
    border:1px solid #999;
}

.red{background:#ff4d4d;}
.orange{background:#ff944d;}
.yellow{background:#ffd11a;}
.green{background:#33cc33;}
.lime{background:#99ff33;}
.blue{background:#3399ff;}
.sky{background:#66ccff;}
.purple{background:#b366ff;}
.pink{background:#ff66cc;}
.white{background:#ffffff;}
</style>
</head>

<body>

<div id="userPage">

    <div id="topButtons">
        <button onclick="goShop()">상점</button>
        <button onclick="goBack()">뒤로</button>
    </div>

    <div id="leftSection">
        <img src="juni.png" id="bigJuni">
    </div>

    <div id="rightSection">
        <h2 id="userName"></h2>
        <h3 id="userCoin"></h3>
    </div>

    <div id="colorPicker">
        <div class="color red" onclick="changeColor('#ff4d4d')"></div>
        <div class="color orange" onclick="changeColor('#ff944d')"></div>
        <div class="color yellow" onclick="changeColor('#ffd11a')"></div>
        <div class="color green" onclick="changeColor('#33cc33')"></div>
        <div class="color lime" onclick="changeColor('#99ff33')"></div>
        <div class="color blue" onclick="changeColor('#3399ff')"></div>
        <div class="color sky" onclick="changeColor('#66ccff')"></div>
        <div class="color purple" onclick="changeColor('#b366ff')"></div>
        <div class="color pink" onclick="changeColor('#ff66cc')"></div>
        <div class="color white" onclick="changeColor('#ffffff')"></div>
    </div>

</div>

<script>

let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
    alert("로그인 후 이용하세요.");
    window.location.href="index.html";
}

let users = JSON.parse(localStorage.getItem("users")||"{}");
let userData = users[currentUser];

document.getElementById("userName").innerText =
    "이름 : " + currentUser;

document.getElementById("userCoin").innerText =
    "코인 : " + userData.coin;

/* 뒤로 */
function goBack(){
    window.location.href="index.html";
}

/* 상점 */
function goShop(){
    window.location.href="shop.html";
}

/* 배경색 */
function changeColor(color){
    document.getElementById("userPage").style.backgroundColor=color;
    userData.bgColor=color;
    localStorage.setItem("users",JSON.stringify(users));
}

if(userData.bgColor){
    document.getElementById("userPage").style.backgroundColor=userData.bgColor;
}

</script>
</body>
</html>
