<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juni World</title>

<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>
body{ margin:0; overflow:hidden; }

button{
    font-family:'Jua', sans-serif;
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:white;
    transition:0.2s;
}
button:hover{ transform:scale(1.1); }

/* 시작화면 */
#startScreen{
    position:relative;
    width:100vw;
    height:100vh;
    background:url("start_bg.png") no-repeat center center;
    background-size:cover;
    overflow:hidden;
}

#titleImage{
    position:absolute;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    width:700px;
    z-index:3;
}

.startButtons{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:20px;
    z-index:4;
}

.floatingJuni{
    position:absolute;
    width:120px;
    pointer-events:auto;
    z-index:2;
}

.screen{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#loginScreen{ display:none; background:#dfe9f3; }
#userScreen{ display:none; background:#f6d365; }

input{ padding:10px; font-size:18px; margin:5px; }

/* 메뉴 */
#menuScreen{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:url("start_bg.png") no-repeat center center;
    background-size:cover;
}

#menuButtons{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    gap:25px;
}

.topBack{
    position:absolute;
    top:20px;
    right:20px;
}

/* 게임 */
#gameWrapper{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
}

#game{
    display:none;
    width:100vw;
    max-width:1200px;
    height:450px;
    background:url("background.png") no-repeat center center;
    background-size:cover;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    overflow:hidden;
    border-radius:20px;
}

#juni{
    width:80px;
    position:absolute;
    bottom:0;
    left:100px;
}

.obstacle{
    position:absolute;
    bottom:0;
}

#scoreBoard{
    position:absolute;
    top:15px;
    left:20px;
    font-size:24px;
    color:white;
    text-shadow:2px 2px 5px black;
}
</style>
</head>

<body>

<!-- 시작화면 -->
<div id="startScreen">
    <img src="juni_text.png" id="titleImage">
    <div class="startButtons">
        <button onclick="openMenu()">게임하기</button>
        <button onclick="showLogin()">Login</button>
    </div>
</div>

<!-- 로그인 -->
<div id="loginScreen" class="screen">
    <h2>회원가입 / 로그인</h2>
    <input id="loginName" placeholder="이름">
    <input id="loginPw" type="password" placeholder="비밀번호">
    <button onclick="loginUser()">확인</button>
    <button onclick="goHome()">Back</button>
</div>

<!-- 유저 화면 -->
<div id="userScreen" class="screen">
    <h1 id="welcomeText"></h1>
    <p id="coinInfo"></p>
    <button onclick="goHome()">홈으로</button>
</div>

<!-- 메뉴 -->
<div id="menuScreen">
    <button class="topBack" onclick="goStart()">뒤로</button>
    <div id="menuButtons">
        <button onclick="openJuniRun()">준이런</button>
        <button>준이의 솔로탈출</button>
        <button>준이는 배고파</button>
    </div>
</div>

<!-- 게임 -->
<div id="gameWrapper">
    <button class="topBack" onclick="backToMenu()">뒤로</button>
    <div id="game">
        <div id="scoreBoard">Time: 0s | Coin: 0</div>
        <img id="juni" src="juni.png">
    </div>
</div>

<script>

/* 로그인 */
let currentUser=null;

function showLogin(){
    startScreen.style.display="none";
    loginScreen.style.display="flex";
}

function loginUser(){
    let name=loginName.value.trim();
    let pw=loginPw.value.trim();
    if(!name||!pw){ alert("입력"); return; }

    let users=JSON.parse(localStorage.getItem("users")||"{}");
    if(users[name]&&users[name]!==pw){ alert("이미 존재"); return; }

    if(!users[name]){
        users[name]=pw;
        localStorage.setItem("users",JSON.stringify(users));
    }

    currentUser=name;
    goHome();
}

function goHome(){
    loginScreen.style.display="none";
    userScreen.style.display="none";
    startScreen.style.display="block";
}

function openMenu(){
    startScreen.style.display="none";
    menuScreen.style.display="block";
}

function goStart(){
    menuScreen.style.display="none";
    startScreen.style.display="block";
}

function openJuniRun(){
    menuScreen.style.display="none";
    gameWrapper.style.display="block";
    game.style.display="block";
    resetGame();
}

function backToMenu(){
    gameWrapper.style.display="none";
    menuScreen.style.display="block";
}

/* ===== 업그레이드 게임 ===== */

let time=0;
let speed=6;
let gameOver=false;
let obstacleTimeout,timerInterval;
let jumpLevel=0;
let isSliding=false;
let coins=0;

function resetGame(){
    document.querySelectorAll(".obstacle").forEach(o=>o.remove());
    gameOver=false;
    time=0;
    speed=6;
    jumpLevel=0;
    coins=0;
    scoreBoard.innerHTML="Time: 0s | Coin: 0";

    spawnObstacle();

    timerInterval=setInterval(()=>{
        time++;
        speed+=0.3;
        scoreBoard.innerHTML="Time: "+time+"s | Coin: "+coins;
    },1000);
}

function jump(){
    if(gameOver || jumpLevel>=2) return;
    jumpLevel++;

    let height=parseInt(juni.style.bottom)||0;
    let maxHeight = jumpLevel===1 ? 120 : 200;

    let up=setInterval(()=>{
        if(height>=maxHeight){
            clearInterval(up);
            let down=setInterval(()=>{
                if(height<=0){
                    height=0;
                    jumpLevel=0;
                    clearInterval(down);
                }
                height-=8;
                juni.style.bottom=height+"px";
            },20);
        }
        height+=8;
        juni.style.bottom=height+"px";
    },20);
}

function slide(){
    if(gameOver || isSliding) return;
    isSliding=true;
    juni.src="juni_slide.png";
    setTimeout(()=>{
        juni.src="juni.png";
        isSliding=false;
    },600);
}

document.addEventListener("keydown",e=>{
    if(e.code==="ArrowUp") jump();
    if(e.code==="ArrowDown") slide();
});

/* 장애물 */

function spawnObstacle(){
    if(gameOver) return;

    let obstacle=document.createElement("img");
    obstacle.className="obstacle";

    let type=Math.random();

    if(type<0.33){
        obstacle.src="obstacle1.png";
        obstacle.style.width="60px";
        obstacle.dataset.type="jump1";
    }
    else if(type<0.66){
        obstacle.src="obstacle1.png";
        obstacle.style.width="90px";
        obstacle.dataset.type="jump2";
    }
    else{
        obstacle.src="obstacle_slice.png";
        obstacle.style.width="70px";
        obstacle.style.bottom="60px";
        obstacle.dataset.type="slice";
    }

    obstacle.style.left=game.offsetWidth+"px";
    game.appendChild(obstacle);

    moveObstacle(obstacle);

    let nextDelay=800+Math.random()*1500;
    obstacleTimeout=setTimeout(spawnObstacle,nextDelay);
}

function moveObstacle(obstacle){
    let move=setInterval(()=>{

        if(gameOver){ clearInterval(move); return; }

        let jr=juni.getBoundingClientRect();
        let or=obstacle.getBoundingClientRect();

        if(jr.right-20>or.left+15 &&
           jr.left+20<or.right-15 &&
           jr.bottom-10>or.top+10){

            if(obstacle.dataset.type==="slice" && isSliding){}
            else if(obstacle.dataset.type==="jump1" && jumpLevel>=1){}
            else if(obstacle.dataset.type==="jump2" && jumpLevel>=2){}
            else{
                gameOver=true;
                juni.src="juni_angry.png";
                clearInterval(timerInterval);
                clearTimeout(obstacleTimeout);
                alert("게임오버!");
            }
        }

        obstacle.style.left=obstacle.offsetLeft-speed+"px";

        if(obstacle.offsetLeft<-120){
            obstacle.remove();
            coins++;
            scoreBoard.innerHTML="Time: "+time+"s | Coin: "+coins;

            if(currentUser){
                let saved=localStorage.getItem(currentUser+"_coin")||0;
                localStorage.setItem(currentUser+"_coin",parseInt(saved)+1);
            }

            clearInterval(move);
        }

    },20);
}

</script>
</body>
</html>
