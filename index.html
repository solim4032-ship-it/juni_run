<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juni Run</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family: Arial Black, sans-serif;
}

/* ================= 시작화면 ================= */

#startScreen{
    position:relative;
    width:100vw;
    height:100vh;
    background:url("start_bg.png") no-repeat center center;
    background-size:cover;
    overflow:hidden;
}

/* JUNI 문구 (최상단) */
#titleImage{
    position:absolute;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    width:700px;
    z-index:3;
}

/* 움직이는 준이 */
.floatingJuni{
    position:absolute;
    width:120px;
    pointer-events:none;
    z-index:2;
    animation: spin 6s linear infinite;
}

@keyframes spin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

/* 하단 버튼 영역 */
#bottomUI{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:20px;
    z-index:4;
}

button{
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:white;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

/* ================= 로그인 화면 ================= */

.screen{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#loginScreen{
    display:none;
    background:#dfe9f3;
}

#userScreen{
    display:none;
    background:#f6d365;
}

input{
    padding:10px;
    font-size:18px;
    margin:5px;
}

/* ================= 게임 ================= */

#game{
    display:none;
    width:100vw;
    max-width:1200px;
    height:450px;
    background:url("background.png") no-repeat center center;
    background-size:cover;
    position:relative;
    overflow:hidden;
    margin:auto;
    top:50%;
    transform:translateY(-50%);
    border-radius:20px;
}

#juni{
    width:80px;
    position:absolute;
    bottom:0;
    left:100px;
}

.obstacle{
    position:absolute;
    bottom:0;
}

#scoreBoard{
    position:absolute;
    top:15px;
    left:20px;
    font-size:24px;
    color:white;
    text-shadow:2px 2px 5px black;
}
</style>
</head>

<body>

<!-- 시작 화면 -->
<div id="startScreen">

    <img src="juni_text.png" id="titleImage">

    <div id="bottomUI">
        <button onclick="startGame()">게임하기</button>
        <button id="loginBtn" onclick="showLogin()">Login</button>
    </div>

</div>

<!-- 로그인 -->
<div id="loginScreen" class="screen">
    <h2>회원가입 / 로그인</h2>
    <input id="loginName" placeholder="이름">
    <input id="loginPw" type="password" placeholder="비밀번호">
    <button onclick="loginUser()">확인</button>
    <button onclick="goHome()">Back</button>
</div>

<!-- 유저 전용 -->
<div id="userScreen" class="screen">
    <h1 id="welcomeText"></h1>
    <button onclick="goHome()">홈으로</button>
</div>

<!-- 게임 -->
<div id="game">
    <div id="scoreBoard">Time: 0s</div>
    <img id="juni" src="juni.png">
</div>

<script>
/* ================= 움직이는 준이 생성 ================= */

function createFloatingJunis(){
    for(let i=0;i<7;i++){
        let img=document.createElement("img");
        img.src="juni.png";
        img.className="floatingJuni";

        img.style.top=Math.random()*80+"%";
        img.style.left=Math.random()*90+"%";

        document.getElementById("startScreen").appendChild(img);

        moveRandom(img);
    }
}

function moveRandom(el){
    setInterval(()=>{
        let x=Math.random()*90;
        let y=Math.random()*80;
        el.style.transition="8s linear";
        el.style.left=x+"%";
        el.style.top=y+"%";
    },8000);
}

createFloatingJunis();

/* ================= 로그인 시스템 ================= */

let currentUser=null;

function showLogin(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("loginScreen").style.display="flex";
}

function loginUser(){
    let name=document.getElementById("loginName").value.trim();
    let pw=document.getElementById("loginPw").value.trim();

    if(name===""||pw===""){
        alert("이름과 비밀번호 입력");
        return;
    }

    let users=JSON.parse(localStorage.getItem("users")||"{}");

    if(users[name]&&users[name]!==pw){
        alert("이미 존재하는 이름");
        return;
    }

    if(!users[name]){
        users[name]=pw;
        localStorage.setItem("users",JSON.stringify(users));
    }

    currentUser=name;

    document.getElementById("loginBtn").innerText="🏠";
    document.getElementById("loginBtn").onclick=openUserScreen;

    goHome();
}

function openUserScreen(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("userScreen").style.display="flex";
    document.getElementById("welcomeText").innerText=currentUser+"님 환영합니다!";
}

function goHome(){
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("userScreen").style.display="none";
    document.getElementById("startScreen").style.display="block";
}

/* ================= 게임 ================= */

let time=0;
let speed=6;
let gameOver=false;
let obstacleInterval,timerInterval;

const game=document.getElementById("game");
const juni=document.getElementById("juni");
const scoreBoard=document.getElementById("scoreBoard");

function startGame(){
    document.getElementById("startScreen").style.display="none";
    game.style.display="block";
    resetGame();
}

document.addEventListener("keydown",e=>{
    if(e.code==="Space"){
        if(gameOver){ resetGame(); }
        else{ jump(); }
    }
});

function jump(){
    if(gameOver)return;

    let height=0;
    let up=setInterval(()=>{
        if(height>=130){
            clearInterval(up);
            let down=setInterval(()=>{
                if(height<=0){
                    clearInterval(down);
                }
                height-=6;
                juni.style.bottom=height+"px";
            },20);
        }
        height+=6;
        juni.style.bottom=height+"px";
    },20);
}

function createObstacle(){
    let obstacle=document.createElement("img");
    obstacle.src="obstacle1.png";
    obstacle.style.width="60px";
    obstacle.className="obstacle";
    obstacle.style.left=game.offsetWidth+"px";
    game.appendChild(obstacle);

    let move=setInterval(()=>{
        if(gameOver){clearInterval(move);return;}

        let jr=juni.getBoundingClientRect();
        let or=obstacle.getBoundingClientRect();

        if(jr.right-20>or.left+15 &&
           jr.left+20<or.right-15 &&
           jr.bottom-10>or.top+10){

            gameOver=true;
            clearInterval(obstacleInterval);
            clearInterval(timerInterval);
            alert("게임오버! 스페이스로 재시작");
        }

        obstacle.style.left=obstacle.offsetLeft-speed+"px";

        if(obstacle.offsetLeft<-120){
            obstacle.remove();
            clearInterval(move);
        }
    },20);
}

function resetGame(){
    document.querySelectorAll(".obstacle").forEach(o=>o.remove());
    gameOver=false;
    time=0;
    speed=6;
    scoreBoard.innerHTML="Time: 0s";

    obstacleInterval=setInterval(createObstacle,2000);
    timerInterval=setInterval(()=>{
        time++;
        speed+=0.2;
        scoreBoard.innerHTML="Time: "+time+"s";
    },1000);
}
</script>

</body>
</html>
