<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juni World</title>

<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Jua', sans-serif;
}

/* ================= 공통 버튼 ================= */
button{
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:white;
    transition:0.2s;
}

button:hover{
    transform:scale(1.1);
}

/* ================= 시작화면 ================= */
#startScreen{
    position:fixed;
    width:100vw;
    height:100vh;
    background:url("start_bg.png") no-repeat center center;
    background-size:cover;
    overflow:hidden;
}
     
#juniText{
    position:absolute;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    width:600px;
    z-index:4; /* floatingJuni(2)보다 위 */
}
    
#startButtons{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:20px;
    z-index:5;
}

.floatingJuni{
    position:absolute;
    width:120px;
    pointer-events:auto;
    z-index:2;
}

/* ================= 로그인/유저 ================= */
.screen{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#loginScreen{ display:none; background:#dfe9f3; }
#userScreen{ display:none; background:#f6d365; }

input{
    padding:10px;
    font-size:18px;
    margin:5px;
}
#loginScreen button + button{
    margin-top:10px;
}

/* ================= 메뉴 ================= */
#menuScreen{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:url("start_bg.png") no-repeat center center;
    background-size:cover;
}

#menuButtons{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    gap:25px;
}

.topBack{
    position:absolute;
    top:20px;
    right:20px;
}

/* ================= 게임 ================= */
#gameWrapper{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
}

#game{
    display:none;
    width:100vw;
    height:100vh;   /* 🔥 화면 전체 */
    background:url("background.png") no-repeat center center;
    background-size:cover;
    position:fixed; /* 🔥 absolute → fixed */
    left:0;
    top:0;
    overflow:hidden;
}

#juni{
    width:130px;
    height:auto;   /* 🔥 비율 유지 */
    position:absolute;
    bottom:0;
    left:100px;
}

#scoreBoard{
    position:absolute;
    top:15px;
    left:20px;
    font-size:24px;
    color:white;
    text-shadow:2px 2px 5px black;
}

#gameOverText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:28px;
    color:white;
    text-shadow:2px 2px 8px black;
    display:none;
    text-align:center;
}
#userPage{
    width:100vw;
    height:100vh;
    display:flex;
    position:relative;
}

/* 왼쪽 */
#leftSection{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

#bigJuni{
    width:350px;
}

/* 오른쪽 */
#rightSection{
    width:50%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:30px;
}

/* 상단 버튼 */
#topButtons{
    position:absolute;
    top:20px;
    right:20px;
}

#topButtons button{
    margin-left:10px;
    padding:10px 20px;
}

/* 색상 선택 */
#colorPicker{
    position:absolute;
    bottom:20px;
    right:20px;
    display:grid;
    grid-template-columns: repeat(5, 30px);
    gap:10px;
}

.color{
    width:30px;
    height:30px;
    border-radius:50%;
    cursor:pointer;
    border:1px solid #999;
}

.red{background:#ff4d4d;}
.orange{background:#ff944d;}
.yellow{background:#ffd11a;}
.green{background:#33cc33;}
.lime{background:#99ff33;}
.blue{background:#3399ff;}
.sky{background:#66ccff;}
.purple{background:#b366ff;}
.pink{background:#ff66cc;}
.white{background:#ffffff;}
    
</style>
</head>

<body>

<!-- 시작화면 -->
<div id="startScreen">
   
  <img id="juniText" src="juni_text.png">
    
  <div id="startButtons">
    <button id="loginBtn" onclick="showLogin()">Login</button>
    <button onclick="openMenu()">게임하기</button>
  </div>
</div>

<!-- 로그인 -->
<div id="loginScreen" class="screen">
    <h2>회원가입 / 로그인</h2>
    <input id="loginName" placeholder="이름">
    <input id="loginPw" type="password" placeholder="비밀번호">
    <button onclick="loginUser()">확인</button>
    <button onclick="goHome()">Back</button>
</div>

<!-- 메뉴 -->
<div id="menuScreen">
    <button class="topBack" onclick="goStart()">뒤로</button>
    <div id="menuButtons">
        <button onclick="openJuniRun()">준이런</button>
        <button>준이의 솔로탈출</button>
        <button>준이는 배고파</button>
    </div>
</div>

<!-- 게임 -->
<div id="gameWrapper">
    <button class="topBack" onclick="backToMenu()">뒤로</button>
    <div id="game">
        <div id="scoreBoard">Time: 0s</div>
        <div id="gameOverText"></div>
        <img id="juni" src="juni.png">
    </div>
</div>

<script>

/* ================= 요소 연결 ================= */
const startScreen = document.getElementById("startScreen");
const loginScreen = document.getElementById("loginScreen");
const menuScreen = document.getElementById("menuScreen");
const gameWrapper = document.getElementById("gameWrapper");
const game = document.getElementById("game");
const juni = document.getElementById("juni");
const scoreBoard = document.getElementById("scoreBoard");
const gameOverText = document.getElementById("gameOverText");
const loginBtn = document.getElementById("loginBtn");
const welcomeText = document.getElementById("welcomeText");
const coinText = document.getElementById("coinText");
const loginName = document.getElementById("loginName");
const loginPw = document.getElementById("loginPw");
const startButtons = document.getElementById("startButtons");

let currentUser = localStorage.getItem("currentUser");

/* ================= 로그인 ================= */
// 페이지 로드 시 로그인 상태 확인
window.addEventListener("load", () => {
    const currentUser = localStorage.getItem("currentUser");
    if(currentUser){
        showHomeButton(currentUser);
    }
});

// 로그인 성공
function loginUser(){
    const name = loginName.value.trim();
    const pw = loginPw.value.trim();
    if(!name || !pw){ alert("입력하세요"); return; }

    let users = JSON.parse(localStorage.getItem("users") || "{}");

    if(!users[name]){
        users[name] = { pw: pw, coin: 100, role: "user" };
        localStorage.setItem("users", JSON.stringify(users));
    }

    if(users[name].pw !== pw){
        alert("비밀번호 다름");
        return;
    }

    localStorage.setItem("currentUser", name);
    currentUser = name;
    loginScreen.style.display = "none";
    startScreen.style.display = "block";

    showHomeButton(name);
}

// 시작화면의 Login 버튼을 🏠 버튼으로 교체
function showHomeButton(userName){
    startButtons.innerHTML = `
        <button id="homeBtn">🏠 ${userName}님</button>
        <button onclick="openMenu()">게임하기</button>
    `;
    document.getElementById("homeBtn").onclick = () => {
        window.location.href = "user.html"; // 유저 페이지로 이동
    };
}

// 로그인 화면에서 취소 시 시작화면 복원
function goHome(){
    loginScreen.style.display = "none";
    startScreen.style.display = "block";
}
/* ================= 떠다니는 준이 ================= */
function createFloatingJunis(){
    for(let i=0;i<7;i++){

        let img=document.createElement("img");
        img.src="juni.png";
        img.className="floatingJuni";
        startScreen.appendChild(img);

        let x=Math.random()*window.innerWidth;
        let y=Math.random()*window.innerHeight;

        let speedX=(Math.random()-0.5)*2;
        let speedY=(Math.random()-0.5)*2;

        let rotation=Math.random()*360;
        let rotationSpeed=(Math.random()-0.5)*2;

        let revertTimeout=null;

        /* ===== 클릭 시 하트 변신 ===== */
        function changeToHeart(){
            img.src="juni_heart.png";

            clearTimeout(revertTimeout);
            revertTimeout=setTimeout(()=>{
                img.src="juni.png";
            },3000);
        }

        img.addEventListener("click",changeToHeart);
        img.addEventListener("touchstart",changeToHeart);

        /* ===== 애니메이션 ===== */
        function animate(){

            x+=speedX;
            y+=speedY;
            rotation+=rotationSpeed;

            /* 화면 밖 나가면 반대편으로 */
            if(x>window.innerWidth+150) x=-150;
            if(x<-150) x=window.innerWidth+150;
            if(y>window.innerHeight+150) y=-150;
            if(y<-150) y=window.innerHeight+150;

            img.style.transform=
                `translate(${x}px,${y}px) rotate(${rotation}deg)`;

            requestAnimationFrame(animate);
        }

        animate();
    }
}
createFloatingJunis();


/* ================= 화면 전환 ================= */
function openMenu(){
    startScreen.style.display="none";
    menuScreen.style.display="block";
}

function goStart(){
    menuScreen.style.display="none";
    startScreen.style.display="block";
}

function openJuniRun(){
    menuScreen.style.display="none";
    gameWrapper.style.display="block";
    game.style.display="block";
    resetGame();
}

function backToMenu(){
    gameWrapper.style.display="none";
    menuScreen.style.display="block";
}

/* ================= 게임 ================= */
let time=0;
let coin=0;
let gameOver=false;
let timerInterval;
let speed = 6;
let obstacleInterval;
/* ===== 물리 엔진 변수 ===== */
let velocityY = 0;
let gravity = 0.9;
let jumpPower = -17;
let ground = 0;

let isJumping = false;
let isSliding = false;

/* ===== 물리 루프 ===== */
function physicsLoop(){

    if(gameOver) return;

    velocityY += gravity;

    let currentBottom = parseInt(juni.style.bottom) || 0;
    currentBottom -= velocityY;

    if(currentBottom <= ground){
        currentBottom = ground;
        velocityY = 0;
        isJumping = false;

        if(!isSliding){
            juni.src = "juni.png";
        }
    }

    juni.style.bottom = currentBottom + "px";

    requestAnimationFrame(physicsLoop);
}

function resetGame(){
    // 🔥 기존 장애물 전부 제거
    document.querySelectorAll(".obstacle").forEach(o => o.remove());
    
    gameOver=false;
    time=0;
    coin=0;
    scoreBoard.innerHTML="Time: 0s | Coin: 0";
    gameOverText.style.display = "none";
    speed = 6;
juni.style.bottom = "0px";
velocityY = 0;
isJumping = false;
isSliding = false;
physicsLoop();
clearInterval(obstacleInterval);
obstacleInterval = setInterval(createObstacle, 1500);

    clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
    time++;

    if(time % 3 === 0){   // 3초마다만 증가
        speed += 0.05;    // 증가폭도 줄이기
    }
    scoreBoard.innerHTML=
    "Time: "+time+"s | Coin: "+coin;

},1000);

}
function createObstacle(){

    if(gameOver) return;

    const obstacle = document.createElement("img");
    obstacle.classList.add("obstacle");

    let type = Math.random() < 0.5 ? "jump" : "slide";

    if(type === "jump"){
        obstacle.src = "obstacle1.png";
        obstacle.style.height = "100px";
        obstacle.style.bottom = "0px";
        obstacle.dataset.type = "jump";
    }
    else{
        obstacle.src = "obstacle_slice.png";
        obstacle.style.height = "100px";
        obstacle.style.bottom = "80px";
        obstacle.dataset.type = "slide";
    }

    obstacle.style.position = "absolute";
    obstacle.style.right = "-80px";

    game.appendChild(obstacle);

    moveObstacle(obstacle);

    clearInterval(obstacleInterval);
    let randomGap = 700 + Math.random()*800;
    obstacleInterval = setInterval(createObstacle, randomGap);
}
    
function moveObstacle(obstacle){

    let move = setInterval(()=>{

        if(gameOver){
            clearInterval(move);
            return;
        }

        let right = parseInt(obstacle.style.right);
        obstacle.style.right = right + speed + "px";

        if(checkCollision(juni, obstacle)){

            let type = obstacle.dataset.type;

            if(type === "jump" && isJumping){
                return;
            }

            if(type === "slide" && isSliding){
                return;
            }

            obstacle.src = "obstacle2.png";
            clearInterval(move);
            endGame();
        }

        if(right > game.offsetWidth){

    coin += 1;
    scoreBoard.innerHTML =
    "Time: "+time+"s | Coin: "+coin;

    clearInterval(move);
    obstacle.remove();
}

    },20);
}
    
function checkCollision(a, b){

    const rect1 = a.getBoundingClientRect();
    const rect2 = b.getBoundingClientRect();

    // 🔥 충돌 범위 줄이기 (숫자 조절 가능)
    const paddingX = 18;
    const paddingY = 23;

    const aLeft   = rect1.left + paddingX;
    const aRight  = rect1.right - paddingX;
    const aTop    = rect1.top + paddingY;
    const aBottom = rect1.bottom - paddingY;

    const bLeft   = rect2.left + paddingX;
    const bRight  = rect2.right - paddingX;
    const bTop    = rect2.top + paddingY;
    const bBottom = rect2.bottom - paddingY;

    return !(
        aTop > bBottom ||
        aBottom < bTop ||
        aRight < bLeft ||
        aLeft > bRight
    );
}
    
function endGame(){

    gameOver = true;
    clearInterval(timerInterval);

    gameOverText.style.display = "block";
        // 🔥 코인 저장
    let currentUser = localStorage.getItem("currentUser");
    if(currentUser){
        let users = JSON.parse(localStorage.getItem("users") || "{}");

        if(users[currentUser]){
            users[currentUser].coin += coin;
            localStorage.setItem("users", JSON.stringify(users));
        }
    }

    if(window.innerWidth > 768){
        gameOverText.innerHTML =
        "게임 오버<br><br>스페이스를 눌러 다시 시작하기";
    }else{
        gameOverText.innerHTML =
        "게임 오버<br><br>화면을 터치해 다시 시작하기";
    }
}

/* ================= 키보드 조작 ================= */
document.addEventListener("keydown", e => {

    if(gameOver){

        if(e.code === "Space"){
            resetGame();
        }

        return;
    }

    if(e.code === "ArrowUp"){
        jump();
    }

    if(e.code === "ArrowDown"){
        slide();
    }

});
    /* ================= 모바일 스와이프 ================= */
let startY = 0;

document.addEventListener("touchstart", e=>{
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{

    if(gameOver){
        resetGame();
        return;
    }

    let diff = e.changedTouches[0].clientY - startY;

    if(diff < -40){
        jump();      // 위로 스와이프
    }

    if(diff > 40){
        slide();     // 아래로 스와이프
    }

});

function jump(){

    if(gameOver) return;
    if(isJumping) return;

    velocityY = jumpPower;
    isJumping = true;
    juni.src = "juni_jump.png";
}

function slide(){

    if(gameOver) return;
    if(isSliding || isJumping) return;

    isSliding = true;

    juni.src = "juni_slide.png";
    juni.style.width = "130px";   // 🔥 width만 유지
}
    document.addEventListener("keyup", e=>{

    if(e.code === "ArrowDown"){

        juni.src = "juni.png";
        isSliding = false;

    }

});


</script>
</body>
</html>
