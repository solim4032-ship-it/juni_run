<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 귀엽고 두꺼운 폰트 -->
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<title>준이런</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #AEE2FF;
    font-family: 'Jua', sans-serif;
}

/* 모든 버튼 공통 스타일 */
button {
    font-family: 'Jua', sans-serif;
    font-size: 24px;
    padding: 18px 40px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,0.15);
    transition: 0.15s;
}

button:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.15);
}

/* 시작화면 */
#startScreen {
    width: 100%;
    height: 100vh;
    position: relative;
    overflow: hidden;
}

/* 게임하기 버튼 */
#startBtn {
    position: absolute;
    top: 70%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #FFD6E8;
}

/* 게임 전체 영역 */
#gameWrapper {
    display: none;
    width: 100%;
    height: 100vh;
    position: relative;
}

/* 준이런 버튼 */
#realStartBtn {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    background: #FFB3C6;
}

/* 게임 화면 */
#game {
    width: 400px;
    height: 600px;
    background: white;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    overflow: hidden;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* 플레이용 준이 */
#juni {
    width: 80px;
    position: absolute;
    bottom: 20px;
    left: 160px;
}

/* 시작화면 둥둥 준이 */
.floatingJuni {
    position: absolute;
    width: 120px;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="startScreen">
    <button id="startBtn">게임하기</button>
</div>

<div id="gameWrapper">
    <button id="realStartBtn">준이런</button>
    <div id="game">
        <img src="juni.png" id="juni">
    </div>
</div>

<script>
const startScreen = document.getElementById("startScreen");
const gameWrapper = document.getElementById("gameWrapper");
const startBtn = document.getElementById("startBtn");
const realStartBtn = document.getElementById("realStartBtn");

let gameStarted = false;

/* 🌸 랜덤 떠다니는 준이 생성 */
function createFloatingJuni() {
    const juni = document.createElement("img");
    juni.src = "juni.png";
    juni.classList.add("floatingJuni");

    startScreen.appendChild(juni);

    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight;
    let speedX = (Math.random() - 0.5) * 4;
    let speedY = (Math.random() - 0.5) * 4;
    let rotation = Math.random() * 360;
    let rotationSpeed = (Math.random() - 0.5) * 6;

    function move() {
        x += speedX;
        y += speedY;
        rotation += rotationSpeed;

        /* 화면 밖으로 나갔다 다시 들어오기 */
        if (x > window.innerWidth + 150) x = -150;
        if (x < -150) x = window.innerWidth + 150;
        if (y > window.innerHeight + 150) y = -150;
        if (y < -150) y = window.innerHeight + 150;

        juni.style.transform =
            `translate(${x}px, ${y}px) rotate(${rotation}deg)`;

        requestAnimationFrame(move);
    }

    move();
}

/* 여러 마리 생성 */
for (let i = 0; i < 8; i++) {
    createFloatingJuni();
}

/* 🎮 화면 전환 */
startBtn.onclick = () => {
    startScreen.style.display = "none";
    gameWrapper.style.display = "block";
};

/* 🚀 실제 게임 시작 */
realStartBtn.onclick = () => {
    if (!gameStarted) {
        gameStarted = true;
        alert("준이런 시작!");
        // 기존 게임 시작 코드 여기 연결
        // startGame();
    }
};
</script>

</body>
</html>
