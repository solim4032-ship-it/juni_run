<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juni World</title>

<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Jua', sans-serif;
}

/* ================= 공통 버튼 ================= */
button{
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:white;
    transition:0.2s;
}

button:hover{
    transform:scale(1.1);
}

/* ================= 시작화면 ================= */
#startScreen{
    position:fixed;
    width:100vw;
    height:100vh;
    background:url("start_bg.png") no-repeat center center;
    background-size:cover;
    overflow:hidden;
}
     
#juniText{
    position:absolute;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    width:600px;
    z-index:4; /* floatingJuni(2)보다 위 */
}
    
#startButtons{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:20px;
    z-index:5;
}

.floatingJuni{
    position:absolute;
    width:120px;
    pointer-events:auto;
    z-index:2;
}

/* ================= 로그인/유저 ================= */
.screen{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#loginScreen{ display:none; background:#dfe9f3; }
#userScreen{ display:none; background:#f6d365; }

input{
    padding:10px;
    font-size:18px;
    margin:5px;
}

/* ================= 메뉴 ================= */
#menuScreen{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:url("start_bg.png") no-repeat center center;
    background-size:cover;
}

#menuButtons{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    gap:25px;
}

.topBack{
    position:absolute;
    top:20px;
    right:20px;
}

/* ================= 게임 ================= */
#gameWrapper{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
}

#game{
    display:none;
    width:100vw;
    max-width:1200px;
    height:450px;
    background:url("background.png") no-repeat center center;
    background-size:cover;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    overflow:hidden;
    border-radius:20px;
}

#juni{
    width:80px;
    position:absolute;
    bottom:0;
    left:100px;
}

#scoreBoard{
    position:absolute;
    top:15px;
    left:20px;
    font-size:24px;
    color:white;
    text-shadow:2px 2px 5px black;
}

#gameOverText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:28px;
    color:white;
    text-shadow:2px 2px 8px black;
    display:none;
    text-align:center;
}
</style>
</head>

<body>

<!-- 시작화면 -->
<div id="startScreen">
   
  <img id="juniText" src="juni_text.png">
    
  <div id="startButtons">
    <button id="loginBtn" onclick="showLogin()">Login</button>
    <button onclick="openMenu()">게임하기</button>
  </div>
</div>

<!-- 로그인 -->
<div id="loginScreen" class="screen">
    <h2>회원가입 / 로그인</h2>
    <input id="loginName" placeholder="이름">
    <input id="loginPw" type="password" placeholder="비밀번호">
    <button onclick="loginUser()">확인</button>
    <button onclick="goHome()">Back</button>
</div>

<!-- 유저 화면 -->
<div id="userScreen" class="screen">
    <h1 id="welcomeText"></h1>
    <h2 id="coinText"></h2>
    <button onclick="goHome()">홈으로</button>
</div>

<!-- 메뉴 -->
<div id="menuScreen">
    <button class="topBack" onclick="goStart()">뒤로</button>
    <div id="menuButtons">
        <button onclick="openJuniRun()">준이런</button>
        <button>준이의 솔로탈출</button>
        <button>준이는 배고파</button>
    </div>
</div>

<!-- 게임 -->
<div id="gameWrapper">
    <button class="topBack" onclick="backToMenu()">뒤로</button>
    <div id="game">
        <div id="scoreBoard">Time: 0s</div>
        <div id="gameOverText"></div>
        <img id="juni" src="juni.png">
    </div>
</div>

<script>

/* ================= 요소 연결 ================= */
const startScreen = document.getElementById("startScreen");
const loginScreen = document.getElementById("loginScreen");
const userScreen = document.getElementById("userScreen");
const menuScreen = document.getElementById("menuScreen");
const gameWrapper = document.getElementById("gameWrapper");
const game = document.getElementById("game");
const juni = document.getElementById("juni");
const scoreBoard = document.getElementById("scoreBoard");
const gameOverText = document.getElementById("gameOverText");
const loginBtn = document.getElementById("loginBtn");
const welcomeText = document.getElementById("welcomeText");
const coinText = document.getElementById("coinText");
const loginName = document.getElementById("loginName");
const loginPw = document.getElementById("loginPw");

/* ================= 떠다니는 준이 ================= */
function createFloatingJunis(){
    for(let i=0;i<7;i++){

        let img=document.createElement("img");
        img.src="juni.png";
        img.className="floatingJuni";
        startScreen.appendChild(img);

        let x=Math.random()*window.innerWidth;
        let y=Math.random()*window.innerHeight;

        let speedX=(Math.random()-0.5)*2;
        let speedY=(Math.random()-0.5)*2;

        let rotation=Math.random()*360;
        let rotationSpeed=(Math.random()-0.5)*2;

        let revertTimeout=null;

        /* ===== 클릭 시 하트 변신 ===== */
        function changeToHeart(){
            img.src="juni_heart.png";

            clearTimeout(revertTimeout);
            revertTimeout=setTimeout(()=>{
                img.src="juni.png";
            },3000);
        }

        img.addEventListener("click",changeToHeart);
        img.addEventListener("touchstart",changeToHeart);

        /* ===== 애니메이션 ===== */
        function animate(){

            x+=speedX;
            y+=speedY;
            rotation+=rotationSpeed;

            /* 화면 밖 나가면 반대편으로 */
            if(x>window.innerWidth+150) x=-150;
            if(x<-150) x=window.innerWidth+150;
            if(y>window.innerHeight+150) y=-150;
            if(y<-150) y=window.innerHeight+150;

            img.style.transform=
                `translate(${x}px,${y}px) rotate(${rotation}deg)`;

            requestAnimationFrame(animate);
        }

        animate();
    }
}
createFloatingJunis();

/* ================= 로그인 ================= */
let currentUser=null;

function showLogin(){
    startScreen.style.display="none";
    loginScreen.style.display="flex";
}

function loginUser(){
    let name=loginName.value.trim();
    let pw=loginPw.value.trim();
    if(!name||!pw){ alert("입력하세요"); return; }

    let users=JSON.parse(localStorage.getItem("users")||"{}");

    if(!users[name]){
        users[name]={pw:pw,coin:0};
    }

    if(users[name].pw!==pw){
        alert("비밀번호 다름");
        return;
    }

    localStorage.setItem("users",JSON.stringify(users));

    currentUser=name;
    loginBtn.innerText="🏠";
    loginBtn.onclick=openUserScreen;
    goHome();
}

function openUserScreen(){
    startScreen.style.display="none";
    userScreen.style.display="flex";

    let users=JSON.parse(localStorage.getItem("users"));
    welcomeText.innerText=currentUser+"님 환영합니다!";
    coinText.innerText="총 코인: "+users[currentUser].coin;
}

function goHome(){
    loginScreen.style.display="none";
    userScreen.style.display="none";
    startScreen.style.display="block";
}

/* ================= 화면 전환 ================= */
function openMenu(){
    startScreen.style.display="none";
    menuScreen.style.display="block";
}

function goStart(){
    menuScreen.style.display="none";
    startScreen.style.display="block";
}

function openJuniRun(){
    menuScreen.style.display="none";
    gameWrapper.style.display="block";
    game.style.display="block";
    resetGame();
}

function backToMenu(){
    if(currentUser){
        let users=JSON.parse(localStorage.getItem("users"));
        users[currentUser].coin+=coin;
        localStorage.setItem("users",JSON.stringify(users));
    }
    gameWrapper.style.display="none";
    menuScreen.style.display="block";
}

/* ================= 게임 ================= */
let time=0;
let coin=0;
let gameOver=false;
let timerInterval;
let speed = 6;
let obstacleInterval;
/* ===== 물리 엔진 변수 ===== */
let velocityY = 0;
let gravity = 0.8;
let jumpPower = -15;
let ground = 0;

let isJumping = false;
let isSliding = false;

/* ===== 물리 루프 ===== */
function physicsLoop(){

    if(gameOver) return;

    velocityY += gravity;

    let currentBottom = parseInt(juni.style.bottom) || 0;
    currentBottom -= velocityY;

    if(currentBottom <= ground){
        currentBottom = ground;
        velocityY = 0;
        isJumping = false;

        if(!isSliding){
            juni.src = "juni.png";
        }
    }

    juni.style.bottom = currentBottom + "px";

    requestAnimationFrame(physicsLoop);
}

function resetGame(){
    gameOver=false;
    time=0;
    coin=0;
    scoreBoard.innerHTML="Time: 0s | Coin: 0";
    gameOverText.style.display = "none";
    speed = 6;
juni.style.bottom = "0px";
velocityY = 0;
isJumping = false;
isSliding = false;
physicsLoop();
clearInterval(obstacleInterval);
obstacleInterval = setInterval(createObstacle, 1500);

    clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
    time++;
    coin++;
    speed += 0.2;
    scoreBoard.innerHTML=
    "Time: "+time+"s | Coin: "+coin;

},1000);

}
function createObstacle(){

    if(gameOver) return;

    const obstacle = document.createElement("img");
    obstacle.classList.add("obstacle");

    let type = Math.random() < 0.5 ? "jump" : "slide";

    if(type === "jump"){
        obstacle.src = "obstacle1.png";
        obstacle.style.height = "70px";
        obstacle.style.bottom = "0px";
        obstacle.dataset.type = "jump";
    }
    else{
        obstacle.src = "obstacle_slice.png";
        obstacle.style.height = "70px";
        obstacle.style.bottom = "80px";
        obstacle.dataset.type = "slide";
    }

    obstacle.style.position = "absolute";
    obstacle.style.right = "-80px";

    game.appendChild(obstacle);

    moveObstacle(obstacle);

    clearInterval(obstacleInterval);
    let randomGap = 1200 + Math.random()*1500;
    obstacleInterval = setInterval(createObstacle, randomGap);
}
    
function moveObstacle(obstacle){

    let move = setInterval(()=>{

        if(gameOver){
            clearInterval(move);
            return;
        }

        let right = parseInt(obstacle.style.right);
        obstacle.style.right = right + speed + "px";

        if(checkCollision(juni, obstacle)){

            let type = obstacle.dataset.type;

            if(type === "jump" && isJumping){
                return;
            }

            if(type === "slide" && isSliding){
                return;
            }

            obstacle.src = "obstacle2.png";
            clearInterval(move);
            endGame();
        }

        if(right > window.innerWidth){
            clearInterval(move);
            obstacle.remove();
        }

    },20);
}
    
function checkCollision(a, b){

    const rect1 = a.getBoundingClientRect();
    const rect2 = b.getBoundingClientRect();

    return !(
        rect1.top > rect2.bottom ||
        rect1.bottom < rect2.top ||
        rect1.right < rect2.left ||
        rect1.left > rect2.right
    );
}
    
function endGame(){

    gameOver = true;
    clearInterval(timerInterval);

    gameOverText.style.display = "block";

    if(window.innerWidth > 768){
        gameOverText.innerHTML =
        "게임 오버<br><br>스페이스를 눌러 다시 시작하기";
    }else{
        gameOverText.innerHTML =
        "게임 오버<br><br>화면을 터치해 다시 시작하기";
    }
}

/* ================= 키보드 조작 ================= */
document.addEventListener("keydown", e => {

    if(gameOver){

        if(e.code === "Space"){
            resetGame();
        }

        return;
    }

    if(e.code === "ArrowUp"){
        jump();
    }

    if(e.code === "ArrowDown"){
        slide();
    }

});
    /* ================= 모바일 스와이프 ================= */
let startY = 0;

document.addEventListener("touchstart", e=>{
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{

    if(gameOver){
        resetGame();
        return;
    }

    let diff = e.changedTouches[0].clientY - startY;

    if(diff < -40){
        jump();      // 위로 스와이프
    }

    if(diff > 40){
        slide();     // 아래로 스와이프
    }

});

function jump(){

    if(gameOver) return;
    if(isJumping || isSliding) return;

    velocityY = jumpPower;
    isJumping = true;
    juni.src = "juni_jump.png";
}

function slide(){

    if(gameOver) return;
    if(isSliding || isJumping) return;

    isSliding = true;

    juni.src = "juni_slide.png";
    juni.style.height = "50px";

    setTimeout(()=>{
        juni.src = "juni.png";
        juni.style.height = "80px";
        isSliding = false;
    },600);
}

</script>
</body>
</html>
