<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juni World</title>

<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Jua', sans-serif;
}

/* ================= 공통 버튼 ================= */
button{
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:white;
    transition:0.2s;
}

button:hover{
    transform:scale(1.1);
}

/* ================= 시작화면 ================= */
#startScreen{
    position:fixed;
    width:100vw;
    height:100vh;
    background:url("start_bg.png") no-repeat center center;
    background-size:cover;
    overflow:hidden;
}

#startButtons{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:20px;
    z-index:5;
}

.floatingJuni{
    position:absolute;
    width:120px;
    pointer-events:auto;
    z-index:2;
}

/* ================= 로그인/유저 ================= */
.screen{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#loginScreen{ display:none; background:#dfe9f3; }
#userScreen{ display:none; background:#f6d365; }

input{
    padding:10px;
    font-size:18px;
    margin:5px;
}

/* ================= 메뉴 ================= */
#menuScreen{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:url("start_bg.png") no-repeat center center;
    background-size:cover;
}

#menuButtons{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    gap:25px;
}

.topBack{
    position:absolute;
    top:20px;
    right:20px;
}

/* ================= 게임 ================= */
#gameWrapper{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
}

#game{
    display:none;
    width:100vw;
    max-width:1200px;
    height:450px;
    background:url("background.png") no-repeat center center;
    background-size:cover;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    overflow:hidden;
    border-radius:20px;
}

#juni{
    width:80px;
    position:absolute;
    bottom:0;
    left:100px;
}

#scoreBoard{
    position:absolute;
    top:15px;
    left:20px;
    font-size:24px;
    color:white;
    text-shadow:2px 2px 5px black;
}
</style>
</head>

<body>

<!-- 시작화면 -->
<div id="startScreen">
  <div id="startButtons">
    <button id="loginBtn" onclick="showLogin()">Login</button>
    <button onclick="openMenu()">게임하기</button>
  </div>
</div>

<!-- 로그인 -->
<div id="loginScreen" class="screen">
    <h2>회원가입 / 로그인</h2>
    <input id="loginName" placeholder="이름">
    <input id="loginPw" type="password" placeholder="비밀번호">
    <button onclick="loginUser()">확인</button>
    <button onclick="goHome()">Back</button>
</div>

<!-- 유저 화면 -->
<div id="userScreen" class="screen">
    <h1 id="welcomeText"></h1>
    <h2 id="coinText"></h2>
    <button onclick="goHome()">홈으로</button>
</div>

<!-- 메뉴 -->
<div id="menuScreen">
    <button class="topBack" onclick="goStart()">뒤로</button>
    <div id="menuButtons">
        <button onclick="openJuniRun()">준이런</button>
        <button>준이의 솔로탈출</button>
        <button>준이는 배고파</button>
    </div>
</div>

<!-- 게임 -->
<div id="gameWrapper">
    <button class="topBack" onclick="backToMenu()">뒤로</button>
    <div id="game">
        <div id="scoreBoard">Time: 0s</div>
        <img id="juni" src="juni.png">
    </div>
</div>

<script>

/* ================= 요소 연결 ================= */
const startScreen = document.getElementById("startScreen");
const loginScreen = document.getElementById("loginScreen");
const userScreen = document.getElementById("userScreen");
const menuScreen = document.getElementById("menuScreen");
const gameWrapper = document.getElementById("gameWrapper");
const game = document.getElementById("game");
const juni = document.getElementById("juni");
const scoreBoard = document.getElementById("scoreBoard");
const loginBtn = document.getElementById("loginBtn");
const welcomeText = document.getElementById("welcomeText");
const coinText = document.getElementById("coinText");
const loginName = document.getElementById("loginName");
const loginPw = document.getElementById("loginPw");

/* ================= 떠다니는 준이 ================= */
function createFloatingJunis(){
    for(let i=0;i<5;i++){
        let img=document.createElement("img");
        img.src="juni.png";
        img.className="floatingJuni";
        startScreen.appendChild(img);

        let x=Math.random()*window.innerWidth;
        let y=Math.random()*window.innerHeight;
        let speedX=(Math.random()-0.5)*3;
        let speedY=(Math.random()-0.5)*3;

        function animate(){
            x+=speedX;
            y+=speedY;

            if(x>window.innerWidth) x=0;
            if(x<0) x=window.innerWidth;
            if(y>window.innerHeight) y=0;
            if(y<0) y=window.innerHeight;

            img.style.transform=`translate(${x}px,${y}px)`;
            requestAnimationFrame(animate);
        }
        animate();
    }
}
createFloatingJunis();

/* ================= 로그인 ================= */
let currentUser=null;

function showLogin(){
    startScreen.style.display="none";
    loginScreen.style.display="flex";
}

function loginUser(){
    let name=loginName.value.trim();
    let pw=loginPw.value.trim();
    if(!name||!pw){ alert("입력하세요"); return; }

    let users=JSON.parse(localStorage.getItem("users")||"{}");

    if(!users[name]){
        users[name]={pw:pw,coin:0};
    }

    if(users[name].pw!==pw){
        alert("비밀번호 다름");
        return;
    }

    localStorage.setItem("users",JSON.stringify(users));

    currentUser=name;
    loginBtn.innerText="🏠";
    loginBtn.onclick=openUserScreen;
    goHome();
}

function openUserScreen(){
    startScreen.style.display="none";
    userScreen.style.display="flex";

    let users=JSON.parse(localStorage.getItem("users"));
    welcomeText.innerText=currentUser+"님 환영합니다!";
    coinText.innerText="총 코인: "+users[currentUser].coin;
}

function goHome(){
    loginScreen.style.display="none";
    userScreen.style.display="none";
    startScreen.style.display="block";
}

/* ================= 화면 전환 ================= */
function openMenu(){
    startScreen.style.display="none";
    menuScreen.style.display="block";
}

function goStart(){
    menuScreen.style.display="none";
    startScreen.style.display="block";
}

function openJuniRun(){
    menuScreen.style.display="none";
    gameWrapper.style.display="block";
    game.style.display="block";
    resetGame();
}

function backToMenu(){
    if(currentUser){
        let users=JSON.parse(localStorage.getItem("users"));
        users[currentUser].coin+=coin;
        localStorage.setItem("users",JSON.stringify(users));
    }
    gameWrapper.style.display="none";
    menuScreen.style.display="block";
}

/* ================= 게임 ================= */
let time=0;
let coin=0;
let gameOver=false;
let timerInterval;

function resetGame(){
    gameOver=false;
    time=0;
    coin=0;
    scoreBoard.innerHTML="Time: 0s | Coin: 0";

    clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
        time++;
        coin++;
        scoreBoard.innerHTML="Time: "+time+"s | Coin: "+coin;
    },1000);
}

document.addEventListener("keydown",e=>{
    if(e.code==="Space"){
        jump();
    }
});

function jump(){
    juni.style.bottom="150px";
    setTimeout(()=>{ juni.style.bottom="0px"; },300);
}

</script>
</body>
</html>
