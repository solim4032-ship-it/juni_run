<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juni World</title>

<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
}

/* ================= 공통 버튼 ================= */

button{
    font-family:'Jua', sans-serif;
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:white;
    transition:0.2s;
}

button:hover{
    transform:scale(1.1);
}

/* ================= 시작화면 ================= */

#startScreen{
    position:relative;
    width:100vw;
    height:100vh;
    background:url("start_bg.png") no-repeat center center;
    background-size:cover;
    overflow:hidden;
}

#titleImage{
    position:absolute;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    width:700px;
    z-index:3;
}

.floatingJuni{
    position:absolute;
    width:120px;
    pointer-events:auto;
    z-index:2;
}

#startBtn{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    z-index:4;
}

/* ================= 게임 선택 화면 ================= */

#menuScreen{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:url("start_bg.png") no-repeat center center;
    background-size:cover;
}

#menuButtons{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    gap:25px;
}

.topBack{
    position:absolute;
    top:20px;
    right:20px;
}

/* ================= 게임 ================= */

#gameWrapper{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
}

#game{
    display:none;
    width:100vw;
    max-width:1200px;
    height:450px;
    background:url("background.png") no-repeat center center;
    background-size:cover;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    overflow:hidden;
    border-radius:20px;
}

#juni{
    width:80px;
    position:absolute;
    bottom:0;
    left:100px;
}

.obstacle{
    position:absolute;
    bottom:0;
}

#scoreBoard{
    position:absolute;
    top:15px;
    left:20px;
    font-size:24px;
    color:white;
    text-shadow:2px 2px 5px black;
}
</style>
</head>

<body>

<!-- 시작화면 -->
<div id="startScreen">
    <img src="juni_text.png" id="titleImage">
    <button id="startBtn" onclick="openMenu()">게임하기</button>
</div>

<!-- 게임 선택 화면 -->
<div id="menuScreen">
    <button class="topBack" onclick="goStart()">뒤로</button>
    <div id="menuButtons">
        <button onclick="openJuniRun()">준이런</button>
        <button>준이의 솔로탈출</button>
        <button>준이는 배고파</button>
    </div>
</div>

<!-- 게임 화면 -->
<div id="gameWrapper">
    <button class="topBack" onclick="backToMenu()">뒤로</button>
    <div id="game">
        <div id="scoreBoard">Time: 0s</div>
        <img id="juni" src="juni.png">
    </div>
</div>

<script>

/* ================= 떠다니는 준이 ================= */

function createFloatingJunis(){
    for(let i=0;i<7;i++){
        let img=document.createElement("img");
        img.src="juni.png";
        img.className="floatingJuni";
        document.getElementById("startScreen").appendChild(img);

        let x=Math.random()*window.innerWidth;
        let y=Math.random()*window.innerHeight;
        let speedX=(Math.random()-0.5)*3;
        let speedY=(Math.random()-0.5)*3;
        let rotation=Math.random()*360;
        let rotationSpeed=(Math.random()-0.5)*5;

        img.addEventListener("click",()=>{
            img.src = img.src.includes("juni_heart.png") ? "juni.png" : "juni_heart.png";
        });

        img.addEventListener("touchstart",()=>{
            img.src = img.src.includes("juni_heart.png") ? "juni.png" : "juni_heart.png";
        });

        function animate(){
            x+=speedX;
            y+=speedY;
            rotation+=rotationSpeed;

            if(x>window.innerWidth+150) x=-150;
            if(x<-150) x=window.innerWidth+150;
            if(y>window.innerHeight+150) y=-150;
            if(y<-150) y=window.innerHeight+150;

            img.style.transform=`translate(${x}px,${y}px) rotate(${rotation}deg)`;
            requestAnimationFrame(animate);
        }
        animate();
    }
}
createFloatingJunis();

/* ================= 화면 전환 ================= */

function openMenu(){
    startScreen.style.display="none";
    menuScreen.style.display="block";
}

function goStart(){
    menuScreen.style.display="none";
    startScreen.style.display="block";
}

function openJuniRun(){
    menuScreen.style.display="none";
    gameWrapper.style.display="block";
    game.style.display="block";
    resetGame();
}

function backToMenu(){
    gameWrapper.style.display="none";
    menuScreen.style.display="block";
}

/* ================= 게임 ================= */

let time=0;
let speed=6;
let gameOver=false;
let obstacleInterval,timerInterval;

function resetGame(){
    document.querySelectorAll(".obstacle").forEach(o=>o.remove());
    gameOver=false;
    time=0;
    speed=6;
    scoreBoard.innerHTML="Time: 0s";

    obstacleInterval=setInterval(createObstacle,2000);
    timerInterval=setInterval(()=>{
        time++;
        speed+=0.2;
        scoreBoard.innerHTML="Time: "+time+"s";
    },1000);
}

document.addEventListener("keydown",e=>{
    if(e.code==="Space"){
        if(gameOver){ resetGame(); }
        else{ jump(); }
    }
});

function jump(){
    if(gameOver)return;

    let height=0;
    let up=setInterval(()=>{
        if(height>=130){
            clearInterval(up);
            let down=setInterval(()=>{
                if(height<=0) clearInterval(down);
                height-=6;
                juni.style.bottom=height+"px";
            },20);
        }
        height+=6;
        juni.style.bottom=height+"px";
    },20);
}

function createObstacle(){
    let obstacle=document.createElement("img");
    obstacle.src="obstacle1.png";
    obstacle.style.width="60px";
    obstacle.className="obstacle";
    obstacle.style.left=game.offsetWidth+"px";
    game.appendChild(obstacle);

    let move=setInterval(()=>{
        if(gameOver){clearInterval(move);return;}

        let jr=juni.getBoundingClientRect();
        let or=obstacle.getBoundingClientRect();

        if(jr.right-20>or.left+15 &&
           jr.left+20<or.right-15 &&
           jr.bottom-10>or.top+10){

            gameOver=true;
            clearInterval(obstacleInterval);
            clearInterval(timerInterval);
            alert("게임오버! 스페이스로 재시작");
        }

        obstacle.style.left=obstacle.offsetLeft-speed+"px";

        if(obstacle.offsetLeft<-120){
            obstacle.remove();
            clearInterval(move);
        }
    },20);
}
</script>

</body>
</html>
