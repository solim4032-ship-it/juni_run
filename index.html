<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juni Run</title>

<style>
body {
    margin: 0;
    background: #87CEEB;
    font-family: Arial Black, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 공통 화면 */
.screen {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* 시작 화면 */
#startScreen {
    background: linear-gradient(#8fd3f4, #84fab0);
}

/* 로그인 영역 */
#loginArea{
    position:absolute;
    top:20px;
    right:20px;
}

button {
    padding: 12px 35px;
    font-size: 22px;
    font-weight: bold;
    margin: 10px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
}

/* 게임 */
#game {
    display: none;
    width: 100vw;
    max-width: 1200px;
    height: 450px;
    background: url("background.png") no-repeat center center;
    background-size: cover;
    position: relative;
    overflow: hidden;
    border-radius: 20px;
}

#juni {
    width: 80px;
    position: absolute;
    bottom: 0;
    left: 100px;
}

.obstacle {
    position: absolute;
    bottom: 0;
}

#scoreBoard {
    position: absolute;
    top: 15px;
    left: 20px;
    font-size: 24px;
    color: white;
    text-shadow: 2px 2px 5px black;
}

/* 로그인 화면 */
#loginScreen {
    display:none;
    background:#dfe9f3;
}

input {
    padding: 10px;
    font-size: 18px;
    margin: 5px;
}

/* 유저 화면 */
#userScreen{
    display:none;
    background:#f6d365;
}
</style>
</head>

<body>

<!-- 시작 화면 -->
<div id="startScreen" class="screen">

    <div id="loginArea">
        <button id="loginBtn" onclick="showLogin()">Login</button>
    </div>

    <h1 style="font-size:70px;">Juni Run</h1>
    <button onclick="startGame()">Juni Run</button>
</div>

<!-- 로그인 화면 -->
<div id="loginScreen" class="screen">
    <h2>회원가입 / 로그인</h2>
    <input id="loginName" placeholder="이름">
    <input id="loginPw" type="password" placeholder="비밀번호">
    <button onclick="loginUser()">확인</button>
    <button onclick="backToStart()">Back</button>
</div>

<!-- 유저 전용 화면 -->
<div id="userScreen" class="screen">
    <h1 id="welcomeText"></h1>
    <p>준이와 함께 최고 기록을 경신하세요 🐶</p>
    <button onclick="goHome()">홈으로</button>
</div>

<!-- 게임 -->
<div id="game">
    <div id="scoreBoard">Time: 0s</div>
    <img id="juni" src="juni.png">
</div>

<script>
let currentUser = null;
let time = 0;
let speed = 6;
let gameOver = false;
let obstacleInterval, timerInterval;

const game = document.getElementById("game");
const juni = document.getElementById("juni");
const scoreBoard = document.getElementById("scoreBoard");

/* ================= 로그인 시스템 ================= */

function showLogin(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("loginScreen").style.display="flex";
}

function loginUser(){
    let name = document.getElementById("loginName").value.trim();
    let pw = document.getElementById("loginPw").value.trim();

    if(name === "" || pw === ""){
        alert("이름과 비밀번호를 입력하세요.");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users") || "{}");

    if(users[name] && users[name] !== pw){
        alert("이미 존재하는 이름입니다.");
        return;
    }

    if(!users[name]){
        users[name] = pw;
        localStorage.setItem("users", JSON.stringify(users));
    }

    currentUser = name;

    document.getElementById("loginArea").innerHTML =
        `<button onclick="openUserScreen()">🏠</button>`;

    document.getElementById("loginScreen").style.display="none";
    document.getElementById("startScreen").style.display="flex";
}

function openUserScreen(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("userScreen").style.display="flex";
    document.getElementById("welcomeText").innerHTML =
        currentUser + "님 환영합니다!";
}

function goHome(){
    document.getElementById("userScreen").style.display="none";
    document.getElementById("startScreen").style.display="flex";
}

function backToStart(){
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("startScreen").style.display="flex";
}

/* ================= 게임 ================= */

function startGame(){
    document.getElementById("startScreen").style.display="none";
    game.style.display="block";
    resetGame();
}

document.addEventListener("keydown", e=>{
    if(e.code==="Space"){
        if(gameOver){
            resetGame();
        } else {
            jump();
        }
    }
});

game.addEventListener("click", function(){
    if(gameOver){
        resetGame();
    } else {
        jump();
    }
});

function jump(){
    if(gameOver) return;

    juni.src = "juni_jump.png";

    let height=0;
    let up=setInterval(()=>{
        if(height>=130){
            clearInterval(up);
            let down=setInterval(()=>{
                if(height<=0){
                    clearInterval(down);
                    juni.src = "juni.png";
                }
                height-=6;
                juni.style.bottom=height+"px";
            },20);
        }
        height+=6;
        juni.style.bottom=height+"px";
    },20);
}

function createObstacle(){
    let obstacle=document.createElement("img");
    obstacle.src="obstacle1.png";
    obstacle.style.width="60px";
    obstacle.className="obstacle";
    obstacle.style.left=game.offsetWidth+"px";
    game.appendChild(obstacle);

    let move=setInterval(()=>{
        if(gameOver){clearInterval(move);return;}

        let jr=juni.getBoundingClientRect();
        let or=obstacle.getBoundingClientRect();

        if(jr.right-20>or.left+15 &&
           jr.left+20<or.right-15 &&
           jr.bottom-10>or.top+10){

            gameOver=true;
            clearInterval(obstacleInterval);
            clearInterval(timerInterval);

            setTimeout(()=>{
                alert("게임오버! 스페이스로 재시작");
            },200);
        }

        obstacle.style.left=obstacle.offsetLeft-speed+"px";

        if(obstacle.offsetLeft<-120){
            obstacle.remove();
            clearInterval(move);
        }
    },20);
}

function resetGame(){
    document.querySelectorAll(".obstacle").forEach(o=>o.remove());
    gameOver=false;
    time=0;
    speed=6;
    scoreBoard.innerHTML="Time: 0s";

    obstacleInterval=setInterval(createObstacle,2000);
    timerInterval=setInterval(()=>{
        time++;
        speed+=0.2;
        scoreBoard.innerHTML="Time: "+time+"s";
    },1000);
}
</script>

</body>
</html>
