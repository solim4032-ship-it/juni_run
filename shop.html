<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juni Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Jua', sans-serif;
    background:#fef6fb;
    text-align:center;
}

h1{
    margin-top:30px;
}

#coinDisplay{
    font-size:22px;
    margin-bottom:20px;
}

.shopContainer{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:40px;
    margin-top:30px;
}

.skinCard{
    background:white;
    padding:20px;
    width:220px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.skinCard img{
    width:120px;
}

button{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-family:'Jua', sans-serif;
}

.buyBtn{
    background:#ffd6e0;
}

.equipBtn{
    background:#caffbf;
}

.owned{
    color:#888;
    margin-top:5px;
}

.topBack{
    position:absolute;
    top:20px;
    right:20px;
}
</style>
</head>

<body>

<button class="topBack" onclick="goBack()">뒤로</button>

<h1>준이 상점</h1>
<div id="coinDisplay"></div>

<div class="shopContainer"></div>

<script>
let currentUser = localStorage.getItem("currentUser");
let users = JSON.parse(localStorage.getItem("users")||"{}");

if(!currentUser){
    alert("로그인 후 이용하세요.");
    window.location.href="index.html";
}

let userData = users[currentUser];

// 🔹 내가 구매한 아이템 목록
if(!userData.ownedItems){
    userData.ownedItems = [];
}

// 🔹 현재 장착한 아이템
if(!userData.equipped){
    userData.equipped = {
        hat: null,
        glass: null,
        cloth: null
    };
}
saveData();

// 아이템 배열 (모자 7개, 안경 2개, 의상 2개)
const shopItems = [
    {id:"hat1", name:"모자1", img:"juni_hat1.png", price:150, type:"hat"},
    {id:"hat2", name:"모자2", img:"juni_hat2.png", price:150, type:"hat"},
    {id:"hat3", name:"모자3", img:"juni_hat3.png", price:150, type:"hat"},
    {id:"hat4", name:"모자4", img:"juni_hat4.png", price:150, type:"hat"},
    {id:"hat5", name:"모자5", img:"juni_hat5.png", price:150, type:"hat"},
    {id:"hat6", name:"모자6", img:"juni_hat6.png", price:150, type:"hat"},
    {id:"hat7", name:"모자7", img:"juni_hat7.png", price:150, type:"hat"},
    {id:"glass1", name:"안경1", img:"juni_glass1.png", price:100, type:"glass"},
    {id:"glass2", name:"안경2", img:"juni_glass2.png", price:100, type:"glass"},
    {id:"cloth1", name:"의상1", img:"juni_cloth1.png", price:300, type:"cloth"},
    {id:"cloth2", name:"의상2", img:"juni_cloth2.png", price:300, type:"cloth"}
];

// 초기 화면 렌더링
updateCoin();
renderShop();

function updateCoin(){
    document.getElementById("coinDisplay").innerText = "보유 코인 : " + userData.coin;
}

function renderShop(){
    const container = document.querySelector(".shopContainer");
    container.innerHTML = "";

    shopItems.forEach(item => {
        const card = document.createElement("div");
        card.className = "skinCard";
        card.id = item.id;

        card.innerHTML = `
            <img src="${item.img}">
            <h3>${item.name}</h3>
            <p>${item.price} 코인</p>
            <div class="actionArea"></div>
        `;

        container.appendChild(card);
        renderCard(item);
    });
}

function renderCard(item){
    const card = document.getElementById(item.id);
    const area = card.querySelector(".actionArea");
    area.innerHTML = "";

    if(userData.ownedItems.includes(item.img)){

        const equipBtn = document.createElement("button");
        equipBtn.innerText = "장착";
        equipBtn.className = "equipBtn";
        equipBtn.onclick = () => {
            userData.equipped[item.type] = item.img;
            saveData();
            renderShop();
        };

        const removeBtn = document.createElement("button");
        removeBtn.innerText = "해제";
        removeBtn.className = "buyBtn";
        removeBtn.onclick = () => {
            userData.equipped[item.type] = null;
            saveData();
            renderShop();
        };

        area.appendChild(equipBtn);
        area.appendChild(removeBtn);

        if(userData.equipped[item.type] === item.img){
            area.innerHTML += "<div class='owned'>현재 장착중</div>";
        }

    } else {

        const buyBtn = document.createElement("button");
        buyBtn.innerText = "구매";
        buyBtn.className = "buyBtn";
        buyBtn.onclick = () => buySkin(item.img, item.price);
        area.appendChild(buyBtn);

    }
}

function buySkin(skinName, price){
    if(userData.coin < price){
        alert("코인이 부족합니다!");
        return;
    }
    userData.coin -= price;
    userData.ownedItems.push(skinName);
    saveData();
    updateCoin();
    renderShop();
}

function saveData(){
    users[currentUser] = userData;
    localStorage.setItem("users", JSON.stringify(users));
}

function goBack(){
    window.location.href="user.html";
}
</script>

</body>
</html>
